<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Daily Donut</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="hero">
        <div class="hero-header">
            <h1 class="logo">Donut of the Day</h1>
            <p class="tagline">Your Daily Bite of Inspiration</p>
        </div>

        <div class="donut-box">
            <div class="box-interior">
                <div class="donut-grid" id="donutGrid"></div>
            </div>
        </div>

        <div class="fortune-section" id="fortuneSection">
            <div class="selected-donut-info" id="selectedInfo">
                <h2 class="selected-title" id="selectedTitle">Select a donut to reveal your fortune</h2>
                <p class="selected-desc" id="selectedDesc"></p>
            </div>
            <div class="fortune-display" id="fortuneDisplay">
                <div class="fortune-text" id="fortuneText"></div>
            </div>
        </div>
    </div>

    <script>
        const fortunes = [
            "Let your heart be kneaded by the hands of love, rising like dough in warmth.\nYou are being prepared for something beautiful.",
            "Honey draws the sweetest souls to the hive.\nBe the nectar that attracts what you wish to become.",
            "The soul is like sugar—dissolving sweetness into everything it touches.\nLet yourself melt into the moment.",
            "Life is a feast, and you are both the guest and the host.\nTaste every moment with gratitude on your tongue.",
            "Bitterness is the shell; sweetness is the seed within.\nCrack open your troubles to find the honey inside.",
            "Like bread rising in silence, your dreams are expanding in the dark.\nTrust the warmth that transforms you.",
            "Pour yourself out like wine from a generous cup.\nThe more you give, the more richly you are filled.",
            "Your heart is a garden where kindness blooms like fruit.\nTend it well, and sweetness will be your harvest.",
            "Savor the bitterness and the sweetness alike.\nBoth are ingredients in the recipe of a life well-lived.",
            "Like cream rising to the surface, your truth cannot stay hidden.\nLet your essence float to the top.",
            "You are the secret ingredient the world has been missing.\nDon't dilute yourself to fit someone else's recipe.",
            "Let your soul simmer slowly in patience.\nThe richest flavors come to those who wait.",
            "Be the warm bread that nourishes, not the stone that weighs down.\nYour softness is your strength.",
            "Sweet words are like honey—they heal and delight in equal measure.\nSpeak them freely today.",
            "The ripe fruit falls when it is ready, not a moment sooner.\nTrust your own timing.",
            "Like salt that brings out flavor, your presence makes everything better.\nDon't underestimate your impact.",
            "Thirst teaches you the value of water.\nLet your longing guide you to what truly nourishes.",
            "The best meals are shared, the best moments are savored.\nDon't rush through your blessings.",
            "You are fermenting into something stronger, deeper, more complex.\nThe waiting is part of your becoming.",
            "Like spices in a dish, difficulties add depth to your story.\nEmbrace the heat that transforms you.",
            "Be generous like the olive tree—giving oil, shade, and beauty.\nAbundance flows through open hands.",
            "Your heart is an oven where love bakes miracles daily.\nTend the fire within.",
            "Like honey that never spoils, your kindness has eternal sweetness.\nIt will outlast everything else.",
            "The crust may be hard, but inside you are still soft and warm.\nDon't mistake your armor for your essence.",
            "Nourish yourself first, then you can feed the world.\nAn empty cup cannot pour.",
            "Like grapes crushed into wine, your struggles are creating something precious.\nThe pressing has purpose.",
            "Be the feast that satisfies, not the snack that merely distracts.\nOffer substance, not just sweetness.",
            "Your presence is the missing spice in someone's day.\nShow up fully, season generously.",
            "Like water finding its way, flow toward what nourishes you.\nAvoid the places that leave you parched.",
            "The garden of your heart needs both rain and sun.\nWelcome all seasons of growth.",
            "Sweet tea is made by sitting in hot water and staying true to yourself.\nLet the heat bring out your essence.",
            "Like a pomegranate split open, reveal your hidden treasures.\nYour abundance is meant to be shared.",
            "You are ripening into your fullness.\nThe sweetest version of you is still becoming.",
            "Like butter melting on warm bread, let love soften your edges.\nThere is beauty in becoming tender.",
            "Thirst is the body's way of calling you home to yourself.\nListen to what you truly hunger for.",
            "Like a well-seasoned pot, you hold the flavors of every experience.\nNothing has been wasted.",
            "Be the warmth that rises from fresh bread.\nYour comfort is a gift to the world.",
            "Like milk and honey flowing together, let gentleness and sweetness be your way.\nThe world needs your softness."
        ];

        const donuts = [
            {
                type: 'strawberry',
                name: 'Strawberry Bliss',
                desc: 'Sweet & bright',
                decoration: '<div class="donut-sprinkle s1"></div><div class="donut-sprinkle s2"></div><div class="donut-sprinkle s3"></div>'
            },
            {
                type: 'chocolate',
                name: 'Chocolate Dream',
                desc: 'Rich & indulgent',
                decoration: '<div class="donut-drizzle"></div>'
            },
            {
                type: 'vanilla',
                name: 'Vanilla Cloud',
                desc: 'Classic & comforting',
                decoration: '<div class="donut-glaze"></div>'
            },
            {
                type: 'matcha',
                name: 'Matcha Zen',
                desc: 'Calm & balanced',
                decoration: '<div class="donut-powder"></div>'
            },
            {
                type: 'blueberry',
                name: 'Blueberry Burst',
                desc: 'Fresh & vibrant',
                decoration: '<div class="donut-spots"></div>'
            },
            {
                type: 'caramel',
                name: 'Caramel Swirl',
                desc: 'Smooth & golden',
                decoration: '<div class="donut-swirl"></div>'
            },
            {
                type: 'raspberry',
                name: 'Raspberry Rose',
                desc: 'Delicate & lovely',
                decoration: '<div class="donut-heart"></div>'
            },
            {
                type: 'lemon',
                name: 'Lemon Zest',
                desc: 'Bright & sunny',
                decoration: '<div class="donut-zest"></div>'
            },
            {
                type: 'cookies',
                name: 'Cookies & Cream',
                desc: 'Fun & nostalgic',
                decoration: '<div class="donut-chunks"></div>'
            },
            {
                type: 'sprinkles',
                name: 'Rainbow Sprinkles',
                desc: 'Joyful & colorful',
                decoration: '<div class="donut-rainbow"></div>'
            }
        ];

        let selectedDonutIndex = null;

        function getDailyFortuneForDonut(donutIndex) {
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
            // Create a unique seed for each donut by combining day of year with donut index
            const seed = (dayOfYear * 997 + donutIndex * 7919) % fortunes.length;
            return fortunes[seed];
        }

        function initDonutGrid() {
            const grid = document.getElementById('donutGrid');
            donuts.forEach((donut, index) => {
                const card = document.createElement('div');
                card.className = 'donut-card';
                card.onclick = () => selectDonut(index);

                const donutEl = document.createElement('div');
                donutEl.className = 'donut-graphic ' + donut.type;
                donutEl.innerHTML = '<div class="donut-hole"></div>' + donut.decoration;

                const tooltip = document.createElement('div');
                tooltip.className = 'donut-tooltip';
                tooltip.innerHTML = `<div class="tooltip-name">${donut.name}</div><div class="tooltip-desc">${donut.desc}</div>`;

                card.appendChild(donutEl);
                card.appendChild(tooltip);
                grid.appendChild(card);
            });
        }

        function selectDonut(index) {
            selectedDonutIndex = index;
            const donut = donuts[index];

            // Update selection styling
            document.querySelectorAll('.donut-card').forEach((card, i) => {
                card.classList.toggle('selected', i === index);
            });

            // Update info
            document.getElementById('selectedTitle').textContent = donut.name;
            document.getElementById('selectedDesc').textContent = donut.desc;

            // Show fortune (unique for this donut today)
            const fortuneDisplay = document.getElementById('fortuneDisplay');
            const fortuneText = document.getElementById('fortuneText');
            fortuneText.textContent = getDailyFortuneForDonut(index);

            fortuneDisplay.classList.add('visible');
            document.getElementById('fortuneSection').classList.add('active');
        }

        initDonutGrid();
    </script>
</body>
</html>
