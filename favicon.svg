<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dough base -->
  <circle cx="50" cy="50" r="45" fill="#d4a574"/>
  <!-- Shadow on dough -->
  <circle cx="50" cy="50" r="45" fill="url(#doughGradient)"/>

  <!-- Pink frosting -->
  <path d="M 50 5 A 45 45 0 0 1 95 50 A 45 45 0 0 1 50 95 A 45 45 0 0 1 5 50 A 45 45 0 0 1 50 5 Z M 50 20 A 30 30 0 0 0 20 50 A 30 30 0 0 0 50 80 A 30 30 0 0 0 80 50 A 30 30 0 0 0 50 20 Z" fill="#ffaadd"/>

  <!-- Hole shadow -->
  <circle cx="50" cy="50" r="20" fill="#8b6747"/>

  <!-- Sprinkles -->
  <rect x="30" y="15" width="8" height="3" fill="#ff5577" rx="1" transform="rotate(35 34 16.5)"/>
  <rect x="55" y="20" width="8" height="3" fill="#44ddcc" rx="1" transform="rotate(-25 59 21.5)"/>
  <rect x="70" y="45" width="8" height="3" fill="#ffdd55" rx="1" transform="rotate(65 74 46.5)"/>
  <rect x="25" y="60" width="8" height="3" fill="#88ee88" rx="1" transform="rotate(-15 29 61.5)"/>

  <defs>
    <radialGradient id="doughGradient">
      <stop offset="30%" stop-color="#f5e6d3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c89860" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
</svg>
